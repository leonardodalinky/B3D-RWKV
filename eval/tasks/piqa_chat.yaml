# Chat-API friendly PIQA: binary A/B between two candidate solutions. No
# assistant prefill (chat APIs reject it), parse answer letter via regex.
task: piqa_chat
dataset_path: baber/piqa
dataset_name: null
output_type: generate_until
training_split: train
validation_split: validation
test_split: null
fewshot_split: train
doc_to_text: 'Given a goal and two candidate solutions (A and B), choose the more sensible solution.\nGoal: {{goal.strip()}}\nA. {{sol1}}\nB. {{sol2}}\nYour response should end with "The best answer is [the_answer_letter]" where the_answer_letter is A or B.'
fewshot_delimiter: "\n\n"
doc_to_target: "{{ 'AB'[label|int] }}"
num_fewshot: 0
generation_kwargs:
  until:
    - "\n\n"
metric_list:
  - metric: exact_match
    aggregation: mean
    higher_is_better: true
    ignore_case: true
    ignore_punctuation: true
filter_list:
  # Single cascade filter: prefer "best answer is X", fall back to any
  # isolated A/B. group_select=-1 picks the LAST match (usually the final
  # answer line, after reasoning). RegexFilter auto-picks the first
  # non-empty capture group across the alternation.
  - name: extract-letter
    filter:
      - function: regex
        regex_pattern: 'best\s+answer\s+is[\s:]*\(?([AB])|(?:^|[^A-Za-z])([AB])(?:\)|\.|\s|$)'
        group_select: -1
      - function: take_first
metadata:
  version: 2.0
